[pytest]
DJANGO_SETTINGS_MODULE = ccp4i2.config.test_settings
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --strict-markers
    --tb=short
markers =
    asyncio: mark test as an async test
    django_db: mark test as requiring database access
    slow: marks tests as slow (deselect with '-m "not slow"')
    network: marks tests that require network access
    order: control test execution order
    pipeline: mark test as a pipeline test (runs actual crystallographic jobs, slow)
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
