    note: "'Recently' is ambiguous without a time anchor — the LLM should not guess a range. No explicit cutoff, no date range."
    registration_target_as_typed: ARd
    assay_target_as_typed: null
    registered_date_range: null
    measurement_filters: []

# =============================================================================
# People — registered_by on the selector, assayed_by per filter
# =============================================================================

- name: registered_by_simple
  prompt: "CDK4 compounds registered by Alice"
  expected:
    type: selector
    registration_target_as_typed: CDK4
    assay_target_as_typed: null
    registered_by_as_typed: Alice
    measurement_filters: []

- name: made_by_is_registered_by
  prompt: "ARd compounds made by Alice Jones"
  expected:
    type: selector
    note: "'made by' is synonymous with 'registered by'."
    registration_target_as_typed: ARd
    assay_target_as_typed: null
    registered_by_as_typed: Alice Jones
    measurement_filters: []

- name: synthesised_by_is_registered_by
  prompt: "CDK4 compounds synthesised by bob.smith"
  expected:
    type: selector
    note: "'synthesised by' is synonymous with 'registered by'."
    registration_target_as_typed: CDK4
    assay_target_as_typed: null
    registered_by_as_typed: bob.smith
    measurement_filters: []

- name: tested_by_on_filter
  prompt: "CDK4 compounds with HTRF IC50 < 100 nM tested by Alice"
  expected:
    type: selector
    note: "'tested by' applies to the assay, so lives on the filter as assayed_by."
    registration_target_as_typed: CDK4
    assay_target_as_typed: null
    measurement_filters:
      - protocol_hint: HTRF
        metric: IC50
        threshold: {op: "<", value: 100, unit: nM}
        assayed_by_as_typed: Alice

- name: assayed_by_on_filter
  prompt: "CDK4 compounds with HTRF data assayed by alice.jones"
  expected:
    type: selector
    registration_target_as_typed: CDK4
    assay_target_as_typed: null
    measurement_filters:
      - protocol_hint: HTRF
        metric: null
        threshold: null
        assayed_by_as_typed: alice.jones

- name: registered_by_and_tested_by_combined
  prompt: "CDK4 compounds made by Alice Jones with HTRF IC50 < 100 nM tested by Bob Smith"
  expected:
    type: selector
    note: "Both registered_by (Alice) and assayed_by (Bob) on the same query."
    registration_target_as_typed: CDK4
    assay_target_as_typed: null
    registered_by_as_typed: Alice Jones
    measurement_filters:
      - protocol_hint: HTRF
        metric: IC50
        threshold: {op: "<", value: 100, unit: nM}
        assayed_by_as_typed: Bob Smith

- name: first_person_is_null
  prompt: "compounds I registered"
  expected:
    type: not_a_query
    reason: "First-person phrasings without a named person cannot be resolved by the backend user resolver."

- name: registered_by_with_date
  prompt: "CDK4 compounds registered by Alice in 2025"
  expected:
    type: selector
    note: "Date + user filters combine on the selector."
    registration_target_as_typed: CDK4
    assay_target_as_typed: null
    registered_by_as_typed: Alice
    registered_date_range: {after: "2025-01-01", before: "2026-01-01"}
    measurement_filters: []

# =============================================================================
# Display-preference-ignoring — the LLM must NOT emit column/format info
# =============================================================================

- name: phys_chem_preference_ignored
  prompt: "phys chem for ARd compounds with HTRF IC50 < 10 uM"
  expected:
    type: selector
    note: "'phys chem' is a display preference (aggregation page handles it); the LLM must not encode it in the selector."
    registration_target_as_typed: ARd
    assay_target_as_typed: null
    measurement_filters:
      - protocol_hint: HTRF
        metric: IC50
        threshold: {op: "<", value: 10, unit: uM}

- name: tabulate_preference_ignored
  prompt: "Tabulate IC50 values in HTRF for ARd compounds under 100 nM"
  expected:
    type: selector
    note: "'Tabulate IC50 values' is a display preference — the filter is just IC50 < 100 nM in HTRF."
    registration_target_as_typed: ARd
    assay_target_as_typed: null
    measurement_filters:
      - protocol_hint: HTRF
        metric: IC50
        threshold: {op: "<", value: 100, unit: nM}

- name: show_spider_plots_ignored
  prompt: "Show me the spider plots for CDK4 compounds with Ki below 1 nM"
  expected:
    type: selector
    note: "'Show me the spider plots' is a display preference — ignore; emit the selection."
    registration_target_as_typed: CDK4
    assay_target_as_typed: null
    measurement_filters:
      - protocol_hint: null
        metric: Ki
        threshold: {op: "<", value: 1, unit: nM}

