# =============================================================================
# Filler-noun discipline (§19.6)
# These prompts use conversational filler ("hits", "series", "analogues")
# that must NOT synthesise a threshold unless the user names a specific cutoff.
# =============================================================================

- name: hits_is_filler
  prompt: "my ARd hits tested in HTRF"
  expected:
    type: selector
    note: "'hits' without an explicit cutoff is filler — just a filter on protocol, no threshold."
    registration_target_as_typed: ARd
    assay_target_as_typed: null
    measurement_filters:
      - protocol_hint: HTRF
        metric: null
        threshold: null

- name: series_is_filler
  prompt: "the ARd series with HTRF IC50 below 100 nM"
  expected:
    type: selector
    note: "'series' is filler; threshold came from explicit '100 nM', not the word 'series'."
    registration_target_as_typed: ARd
    assay_target_as_typed: null
    measurement_filters:
      - protocol_hint: HTRF
        metric: IC50
        threshold: {op: "<", value: 100, unit: nM}

- name: analogues_is_filler
  prompt: "BRD4 analogues with HTRF EC50 values"
  expected:
    type: selector
    note: "'analogues' is filler; no threshold invented."
    registration_target_as_typed: BRD4
    assay_target_as_typed: null
    measurement_filters:
      - protocol_hint: HTRF
        metric: EC50
        threshold: null

- name: hits_with_explicit_cutoff
  prompt: "ARd hits defined as HTRF IC50 below 10 nM"
  expected:
    type: selector
    note: "Here 'hits' IS defined by a cutoff — threshold tracks the explicit definition."
    registration_target_as_typed: ARd
    assay_target_as_typed: null
    measurement_filters:
      - protocol_hint: HTRF
        metric: IC50
        threshold: {op: "<", value: 10, unit: nM}

# =============================================================================
# Ambiguous target — LLM emits verbatim; resolver produces Clarify downstream
# =============================================================================

- name: myc_ambiguous
  prompt: "MYC compounds with HTRF IC50 below 500 nM"
  expected:
    type: selector_with_clarify
    note: "'MYC' maps to multiple targets via shared gene symbol — clarified downstream."
    registration_target_as_typed: MYC
    assay_target_as_typed: null
    measurement_filters:
      - protocol_hint: HTRF
        metric: IC50
        threshold: {op: "<", value: 500, unit: nM}

- name: aurora_pan_family
  prompt: "Aurora kinase compounds with HTRF IC50 below 100 nM"
  expected:
    type: selector_with_clarify
    note: "Pan-family query — may resolve via gene aliases to multiple Aurora programmes."
    registration_target_as_typed: Aurora kinase
    assay_target_as_typed: null
    measurement_filters:
      - protocol_hint: HTRF
        metric: IC50
        threshold: {op: "<", value: 100, unit: nM}

# =============================================================================
# Date filters — registration date on the selector, assay date per filter
# (half-open [after, before) ranges; "before" is EXCLUSIVE upper bound)
# =============================================================================

