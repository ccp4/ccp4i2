# NLP CompoundSelector golden set (§12 eval bar, pivoted 2026-04-23)
#
# Each entry has:
#   name     — short snake_case identifier (stable; used as log-line prefix)
#   prompt   — the English input a chemist might type into the command bar
#   expected — the CompoundSelector the LLM must emit (or a {type: not_a_query}
#              marker). Field names match apps/compounds/nlp/spec.py.
#
# Types:
#   selector              — LLM emits a CompoundSelector with these fields
#   selector_with_clarify — same, but the user's typed string is known to
#                           map to multiple targets / protocols in a hydrated
#                           instance; the resolver produces a Clarify. Tests
#                           that the LLM does NOT try to disambiguate.
#   not_a_query           — LLM must emit {"not_a_query": true, "reason": "..."}
#
# The LLM must emit strings verbatim as the user typed them (§8). So an
# entry's expected_selector.*_as_typed / protocol_hint / metric fields are
# strings FROM THE PROMPT, not the database's canonical names.
#
# Success bars (§12):
#   - ≥90% exact match on type: selector / selector_with_clarify at T=0
#   - 100% of type: not_a_query correctly identified (no false positives)

# =============================================================================
# Single-target, single-filter with threshold
# =============================================================================

- name: ard_htrf_ic50_uM
  prompt: "ARd compounds with HTRF IC50 < 10 uM"
  expected:
    type: selector
    registration_target_as_typed: ARd
    assay_target_as_typed: null
    measurement_filters:
      - protocol_hint: HTRF
        metric: IC50
        threshold: {op: "<", value: 10, unit: uM}

- name: ard_htrf_ic50_nM_le
  prompt: "Show ARd compounds with HTRF IC50 ≤ 50 nM"
  expected:
    type: selector
    registration_target_as_typed: ARd
    assay_target_as_typed: null
    measurement_filters:
      - protocol_hint: HTRF
        metric: IC50
        threshold: {op: "<=", value: 50, unit: nM}

- name: brd4_alphalisa_ec50
  prompt: "BRD4 compounds with AlphaLISA EC50 below 500 nM"
