# NLP query golden set (slice 8, §12 eval bar)
#
# Each entry has:
#   name    — short snake_case identifier (stable over time; log line for diffing)
#   prompt  — the English input a chemist might type into the command bar
#   expected — the QuerySpec the LLM must emit (or a {type: not_a_query} marker)
#
# The LLM must emit strings **verbatim as the user typed them** — no
# canonicalisation, no guessed IDs, no translation of case/aliases (§8, decision
# 2). So an entry's expected_spec.*_as_typed fields are strings from the prompt,
# not the database's canonical names.
#
# Types:
#   spec                  — LLM should emit a QuerySpec with the given fields
#   spec_with_ambiguity   — same, but the user's typed string is known to map to
#                           multiple targets/protocols in a gene-hydrated instance;
#                           the resolver will produce a Clarify downstream. Tests
#                           the LLM's discipline of NOT trying to disambiguate.
#   not_a_query           — LLM should emit {"not_a_query": true, "reason": "..."}
#
# Success bars (§12):
#   - ≥90% exact match on type: spec / spec_with_ambiguity at temperature 0
#   - 100% of type: not_a_query entries correctly identified (no false positives
#     that silently parse as specs)

# =============================================================================
# Single-target prompts with threshold
# =============================================================================

- name: phys_chem_ard_htrf_ic50_uM
  prompt: "phys chem for ARd compounds with HTRF IC50 < 10 uM"
  expected:
    type: spec
    registration_target_as_typed: ARd
    assay_target_as_typed: ARd
    protocol_hint: HTRF
    metric: IC50
    threshold: {op: "<", value: 10, unit: uM}
    columns: phys_chem

- name: tabulate_ard_htrf_ic50_nM
  prompt: "Tabulate IC50 values in HTRF for ARd compounds under 100 nM"
  expected:
    type: spec
    registration_target_as_typed: ARd
    assay_target_as_typed: ARd
    protocol_hint: HTRF
