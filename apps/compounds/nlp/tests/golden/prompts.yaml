        metric: IC50
        threshold: {op: ">", value: 1, unit: uM}

# =============================================================================
# Cross-protocol selectivity (the MAIN new capability of the pivot)
# =============================================================================

- name: megfr_wt_tm_selectivity
  prompt: "mEGFR compounds with mEGFR TR-FRET WT IC50 < 10 uM but TM IC50 > 1 uM"
  expected:
    type: selector
    note: "Cross-protocol selectivity — the core new case. WT and TM become two filters ANDed."
    registration_target_as_typed: mEGFR
    assay_target_as_typed: null
    measurement_filters:
      - protocol_hint: mEGFR TR-FRET WT
        metric: IC50
        threshold: {op: "<", value: 10, unit: uM}
      - protocol_hint: TM
        metric: IC50
        threshold: {op: ">", value: 1, unit: uM}

- name: cdk4_selectivity_over_cdk6
  prompt: "CDK4 compounds with CDK4 IC50 under 100 nM and CDK6 IC50 over 1 uM"
  expected:
    type: selector
    note: "CDK4/6 selectivity window — standard medicinal-chem query."
    registration_target_as_typed: CDK4
    assay_target_as_typed: null
    measurement_filters:
      - protocol_hint: CDK4
        metric: IC50
        threshold: {op: "<", value: 100, unit: nM}
      - protocol_hint: CDK6
        metric: IC50
        threshold: {op: ">", value: 1, unit: uM}

- name: htrf_alphalisa_concordance
  prompt: "ARd compounds with HTRF IC50 < 100 nM and AlphaLISA IC50 < 100 nM"
  expected:
    type: selector
    note: "Concordance across two orthogonal readouts — both filters on IC50 metric."
    registration_target_as_typed: ARd
    assay_target_as_typed: null
    measurement_filters:
      - protocol_hint: HTRF
        metric: IC50
        threshold: {op: "<", value: 100, unit: nM}
      - protocol_hint: AlphaLISA
        metric: IC50
        threshold: {op: "<", value: 100, unit: nM}

