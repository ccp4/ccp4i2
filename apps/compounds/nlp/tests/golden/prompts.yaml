# =============================================================================
# Filler-noun discipline (§19.6)
# These prompts use conversational filler ("hits", "series", "analogues") that
# must NOT synthesise a threshold unless the user names a specific cutoff.
# =============================================================================

- name: hits_is_filler
  prompt: "HTRF IC50 values for my ARd hits"
  expected:
    type: spec
    note: "'hits' carries no structural meaning without an explicit cutoff; threshold must stay null."
    registration_target_as_typed: ARd
    assay_target_as_typed: ARd
    protocol_hint: HTRF
    metric: IC50
    threshold: null
    columns: phys_chem

- name: series_is_filler
  prompt: "Show HTRF IC50 in the ARd series"
  expected:
    type: spec
    note: "'series' is filler; no threshold should be invented."
    registration_target_as_typed: ARd
    assay_target_as_typed: ARd
    protocol_hint: HTRF
    metric: IC50
    threshold: null
    columns: phys_chem

- name: analogues_is_filler
  prompt: "HTRF EC50 for BRD4 analogues"
  expected:
    type: spec
    note: "'analogues' is filler."
    registration_target_as_typed: BRD4
    assay_target_as_typed: BRD4
    protocol_hint: HTRF
    metric: EC50
    threshold: null
    columns: phys_chem

- name: hits_with_explicit_cutoff
  prompt: "ARd hits defined as HTRF IC50 below 10 nM, with phys chem"
  expected:
    type: spec
    note: "When the user defines 'hits' with an explicit cutoff, the threshold IS the cutoff."
    registration_target_as_typed: ARd
    assay_target_as_typed: ARd
    protocol_hint: HTRF
    metric: IC50
    threshold: {op: "<", value: 10, unit: nM}
    columns: phys_chem

# =============================================================================
# Ambiguous target (user types a gene symbol shared across multiple targets)
# The LLM must emit the string verbatim — the resolver produces Clarify
# downstream. Tests that the LLM does NOT try to pick.
# =============================================================================

- name: myc_ambiguous
  prompt: "HTRF IC50 values for MYC compounds"
  expected:
    type: spec_with_ambiguity
    note: "'MYC' hits multiple targets via the shared gene; resolver clarifies downstream. LLM must NOT pick."
    registration_target_as_typed: MYC
    assay_target_as_typed: MYC
    protocol_hint: HTRF
    metric: IC50
    threshold: null
    columns: phys_chem

- name: aurora_pan_family
  prompt: "Aurora kinase compounds with HTRF IC50 below 100 nM"
  expected:
    type: spec_with_ambiguity
    note: "Pan-family query — may resolve via gene aliases to multiple Aurora programmes."
    registration_target_as_typed: Aurora kinase
    assay_target_as_typed: Aurora kinase
    protocol_hint: HTRF
    metric: IC50
    threshold: {op: "<", value: 100, unit: nM}
    columns: phys_chem

