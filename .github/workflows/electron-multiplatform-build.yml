name: Electron Multiplatform Build

on:
  push:
    branches:
      - django
  pull_request:
    branches:
      - django

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build Electron app
        run: npm run build:electron
        working-directory: client

      - name: Prune dev dependencies and free disk space
        run: |
          npm prune --omit=dev
          npm cache clean --force
          rm -rf /tmp/* 2>/dev/null || true
          df -h
        working-directory: client

      - name: Package macOS app (dmg)
        run: npx electron-builder
        working-directory: client

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS-dmg
          path: client/dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build Electron app
        run: npm run build:electron
        working-directory: client

      - name: Prune dev dependencies
        run: npm prune --omit=dev
        working-directory: client

      - name: Package Windows app (nsis & portable)
        run: npx electron-builder --win
        working-directory: client

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            client/dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build Electron app
        run: npm run build:electron
        working-directory: client

      - name: Prune dev dependencies
        run: npm prune --omit=dev
        working-directory: client

      - name: Package Linux x64 AppImage
        run: npx electron-builder --linux AppImage --x64
        working-directory: client

      - name: List dist contents
        run: ls -lh client/dist

      - name: Upload Linux AppImage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimages
          path: client/dist/*.AppImage
