[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ccp4i2-auth"
version = "0.0.0.dev0"
description = "Shared auth + api-fetch contract for CCP4i2 and consumers"
readme = "README.md"
license = { text = "LGPL-3.0-or-later" }
requires-python = ">=3.9"
authors = [
    { name = "CCP4i2 contributors" }
]
# Runtime deps are added as code is migrated in (PyJWT, requests, certifi, etc.)
dependencies = []

[project.optional-dependencies]
test = ["pytest", "pytest-django"]

[tool.hatch.build.targets.wheel]
packages = ["ccp4i2_auth"]
