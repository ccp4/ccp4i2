[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ccp4i2-api"
version = "0.3.2"
description = "Shared API contract (auth, api-fetch, request/response types) for CCP4i2 and consumers"
readme = "README.md"
license = { text = "LGPL-3.0-or-later" }
requires-python = ">=3.9"
authors = [
    { name = "CCP4i2 contributors" }
]
dependencies = [
    "django>=4.2,<6.0",
    "djangorestframework>=3.14",
    "PyJWT[crypto]>=2.10",
    "certifi>=2024.0.0",
]

[project.optional-dependencies]
test = ["pytest", "pytest-django"]

[project.urls]
Homepage = "https://github.com/ccp4/ccp4i2/tree/django-sliced/packages/ccp4i2-api"
Repository = "https://github.com/ccp4/ccp4i2"
Issues = "https://github.com/ccp4/ccp4i2/issues"

[tool.hatch.build.targets.wheel]
packages = ["ccp4i2_api"]

[tool.hatch.build.targets.sdist]
include = [
    "ccp4i2_api/",
    "tests/python/",
    "pyproject.toml",
    "README.md",
]

[tool.pytest.ini_options]
testpaths = ["tests/python"]
python_files = ["test_*.py"]
DJANGO_SETTINGS_MODULE = "test_settings"
pythonpath = ["tests/python"]
