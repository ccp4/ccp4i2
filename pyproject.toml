[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "ccp4i2"
dynamic = ["version"]
description = "CCP4i2 graphical interface for CCP4 software"
readme = "README.md"
license = { file = "LICENSE" }
keywords = ["CCP4", "X-ray", "Crystallography", "MX", "Interface"]
classifiers = [
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Private :: Do Not Upload",
]
dependencies = [
    "biopython",
    "django",
    "gemmi",
    "lxml",
    "matplotlib",
    "numpy",
    "PySide2",
    "pytest",
    "requests",
    "scipy",
    # "acedrg",
    # "adding_stats_to_mmcif",
    # "ample",
    # "bs4",
    # "bzrlib",
    # "ccp4mg",
    # "ccp4srs",
    # "clipper",
    # "cookielib",
    # "coot_gui_api",
    # "coot_gui",
    # "coot",
    # "dateutil",
    # "dials",
    # "docx",
    # "dxtbx",
    # "Foundation",
    # "future",
    # "gi",
    # "gtk",
    # "iotbx",
    # "mmtbx",
    # "mrbump",
    # "mrparse",
    # "msilib",
    # "onedep",
    # "paramiko",
    # "PdbView",
    # "phaser_ext",
    # "phaser",
    # "phmmerReport",
    # "psutil",
    # "pycofe",
    # "PyQt4",
    # "pyrvapi",
    # "rdkit",
    # "shiboken2",
    # "simbad",
    # "sip",
    # "stat",
    # "xia2",
]
requires-python = ">=3.9"

[project.scripts]
ccp4i2 = "ccp4i2.__main__:main"

[project.urls]
Source = "https://github.com/ccp4/ccp4i2"
Issues = "https://github.com/ccp4/ccp4i2/issues"

[tool.setuptools.dynamic]
version = { attr = "ccp4i2.__version__" }

[tool.setuptools.package-data]
ccp4i2 = ["*"]
