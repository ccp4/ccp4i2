[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "ccp4i2"
dynamic = ["version"]
description = "CCP4i2 graphical interface for CCP4 software"
readme = "README.md"
license = { file = "LICENSE" }
keywords = ["CCP4", "X-ray", "Crystallography", "MX", "Interface"]
classifiers = [
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Private :: Do Not Upload",
]
dependencies = [
    "acedrg",
    "adding_stats_to_mmcif",
    "ample",
    "biopython",
    "bs4",
    "bzrlib",
    "CCP4MakeMgPicture",
    "ccp4mg",
    "ccp4srs",
    "clipper",
    "cookielib",
    "coot_gui_api",
    "coot_gui",
    "coot",
    "dateutil",
    "dials",
    "displayTableObjects",
    "django",
    "docx",
    "dxtbx",
    "Foundation",
    "future",
    "gemmi",
    "gi",
    "global_definitions",
    "gtk",
    "hklfile",
    "iotbx",
    "lxml",
    "matplotlib",
    "MGApplication",
    "mmdb2",
    "mmtbx",
    "mmut",
    "MolLabel",
    "mrbump",
    "mrparse",
    "msilib",
    "numpy",
    "onedep",
    "paramiko",
    "PdbView",
    "phaser_ext",
    "phaser",
    "phmmerReport",
    "point_funcs",
    "psutil",
    "pycofe",
    "pygl_coord",
    "PyQt4",
    "pyrvapi",
    "PySide2",
    "pytest",
    "pywin32",
    "rdkit",
    "requests",
    "scipy",
    "sequence_util",
    "SequenceViewer",
    "shiboken2",
    "simbad",
    "sip",
    "stat",
    "UtilityThread",
    "xia2",
]
requires-python = ">=3.9"

[project.scripts]
ccp4i2 = "ccp4i2.__main__:main"

[project.urls]
Source = "https://github.com/ccp4/ccp4i2"
Issues = "https://github.com/ccp4/ccp4i2/issues"

[tool.setuptools.dynamic]
version = { attr = "ccp4i2.__version__" }

[tool.setuptools.package-data]
ccp4i2 = ["*"]
